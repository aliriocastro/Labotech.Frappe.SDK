name: Publish NuGet

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore

      - name: Pack
        run: dotnet pack -c Release --no-restore /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push **/*.nupkg
          --source "https://nuget.pkg.github.com/aliriocastro/index.json"
          --api-key ${{ secrets.PACKAGES_TOKEN }}
          --skip-duplicate
